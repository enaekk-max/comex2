spring.application.name=gestion-carga-ms
server.port=8081

# Database Configuration (Laragon / MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/carga_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-at-start=true

# Feign Client External URL
services.clasificacion.url=http://localhost:8082

# Trace Logs
logging.level.org.springframework.web=INFO
logging.level.com.comex.gestioncarga=DEBUG